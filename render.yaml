services:
  - type: web
    name: loan-leads-backend
    env: node
    buildCommand: |
      echo "=== Building from repo root ==="
      pwd
      ls -la
      echo "=== Building frontend ==="
      cd frontend && npm install && ng build --configuration production
      echo "=== Copying frontend build to backend/dist/frontend ==="
      mkdir -p ../backend/dist/frontend
      cp -r dist/loan-leads-frontend/browser ../backend/dist/frontend
      ls -la ../backend/dist/frontend/
      echo "=== Building backend ==="
      cd ../backend && npm install && npm run build
      ls -la dist/
    startCommand: cd backend && npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false