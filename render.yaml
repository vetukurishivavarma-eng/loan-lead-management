services:
  - type: web
    name: loan-leads-backend
    env: node
    buildCommand: cd backend && npm install && npm run build && cd ../frontend && npm install && npm install && ng build --configuration production && cp -r dist/loan-leads-frontend/browser ../backend/dist/frontend
    startCommand: cd backend && npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
