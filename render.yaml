services:
  - type: web
    name: loan-leads-backend
    env: node
    buildCommand: cd frontend && npm install && ng build --configuration production && mkdir -p ../backend/dist/frontend && cp -r dist/loan-leads-frontend/browser ../backend/dist/frontend && cd ../backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
