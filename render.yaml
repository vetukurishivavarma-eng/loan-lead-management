services:
  - type: web
    name: loan-leads-backend
    env: node
    buildCommand: |
      cd frontend && npm install && ng build --configuration production && cd ..
      cd backend && mkdir -p dist/frontend
      cp -r ../frontend/dist/loan-leads-frontend/browser dist/frontend/
      ls -la dist/frontend/
      npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false